<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Slot Game Kit</title>
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #696969;
      color: #fff;
      font-family: Arial, sans-serif;
      overscroll-behavior: none;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      position: fixed;
      inset: 0;
    }

    #root {
      width: var(--elgallero-viewport-width, 100vw);
      height: var(--elgallero-viewport-height, 100dvh);
      overflow: hidden;
    }

    .slot-shell {
      width: var(--elgallero-viewport-width, 100vw);
      height: var(--elgallero-viewport-height, 100dvh);
      display: flex;
      min-width: 0;
      min-height: 0;
      background: #696969;
    }

    .slot-canvas-host {
      flex: 1 1 auto;
      min-width: 0;
      min-height: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #696969;
    }

    canvas {
      display: block;
      background: transparent;
      touch-action: none;
    }
  </style>
</head>
<body>
  <script type="module" src="/src/app/main.tsx"></script>
</body>
</html>
